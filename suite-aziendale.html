<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suite Aziendale | Orbis Enterprise</title>
    <style>
        /* Reset e Base Mobile-First */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top center, #111827 0%, #020617 100%);
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header - La Barra Superiore */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            padding: 15px 40px; 
            box-sizing: border-box;
            gap: 20px;
        }

        /* Titolo - Grigio chiarissimo per stacco visivo dalle icone */
        h1.main-title {
            font-size: clamp(1.8rem, 4.5vw, 3rem); 
            letter-spacing: 3px;
            margin: 0;
            color: #e2e8f0; 
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            justify-self: center;
            text-align: center;
            cursor: pointer;
        }

        /* Pulsante Gemini */
        .gemini-cta {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.4);
            padding: 12px 24px;
            border-radius: 30px;
            color: #f8fafc;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            justify-self: start;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .gemini-cta:hover {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
            transform: translateY(-2px);
        }

        .gemini-cta svg { width: 22px; height: 22px; fill: none; stroke: #38bdf8; stroke-width: 2; }
        .gemini-cta svg path { fill: #38bdf8; }

        /* Contenitore Social */
        .social-icons {
            display: flex;
            gap: 22px;
            justify-self: end;
            align-items: center;
        }

        .social-icons a { color: #f8fafc; display: inline-flex; transition: color 0.3s ease, transform 0.3s ease; }
        .social-icons a:hover { color: #38bdf8; transform: translateY(-3px); }
        .social-icons svg { width: 28px; height: 28px; fill: currentColor; }

        /* CONTENITORE TESTI */
        .policy-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 20px 60px;
            width: 100%;
            box-sizing: border-box;
        }

        .policy-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 24px;
            padding: 50px;
            max-width: 1100px;
            width: 100%;
            text-align: left;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            color: #cbd5e1;
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .policy-card h2 {
            font-size: 2.2rem;
            color: #f8fafc;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-align: center;
        }

        .policy-card .subtitle {
            text-align: center;
            color: #38bdf8;
            font-size: 1.2rem;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            padding-bottom: 20px;
        }

        .policy-card h3 {
            font-size: 1.6rem;
            color: #f8fafc;
            text-transform: uppercase;
            margin-top: 50px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            border-left: 4px solid #38bdf8;
            padding-left: 15px;
        }

        .policy-card h4 {
            font-size: 1.2rem;
            color: #38bdf8;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .policy-card p { margin-bottom: 20px; }
        .policy-card b { color: #f8fafc; }

        .note-box {
            background: rgba(56, 189, 248, 0.1);
            border-left: 4px solid #38bdf8;
            padding: 20px;
            margin: 30px 0;
            border-radius: 0 8px 8px 0;
        }

        .compliance-box {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-left: 4px solid #ef4444;
            padding: 25px;
            margin: 40px 0;
            border-radius: 8px;
        }

        .compliance-box h4 {
            color: #ef4444;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .compliance-box b { color: #fca5a5; }

        /* Elenchi personalizzati */
        .services-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        .services-list li {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 10px;
        }

        .services-list b { color: #38bdf8; }

        /* Griglia Agenti */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-top: 30px;
        }

        .agent-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .agent-card:hover {
            border-color: #38bdf8;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .agent-card h4 { margin-top: 0; color: #f8fafc; font-size: 1.3rem; border-bottom: 1px solid rgba(56, 189, 248, 0.2); padding-bottom: 10px;}
        .agent-card .agent-role { color: #38bdf8; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 15px; display: block;}
        .agent-card p { font-size: 0.95rem; margin-bottom: 0; color: #94a3b8;}

        .btn-wrapper { text-align: center; margin-top: 60px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }

        .btn-action {
            display: inline-block;
            background: #38bdf8;
            color: #0f172a;
            padding: 14px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .btn-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.7);
            background: #f8fafc;
        }

        .btn-back {
            display: inline-block;
            background: transparent;
            color: #38bdf8;
            border: 2px solid #38bdf8;
            padding: 12px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: rgba(56, 189, 248, 0.1);
            transform: translateX(-5px);
        }

        /* Footer Strutturato */
        footer {
            width: 100%;
            background-color: #0b1120;
            border-top: 1px solid #1e293b;
            padding: 30px 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: auto;
        }

        .footer-main { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; width: 100%; margin: 0 auto; flex-wrap: wrap; gap: 20px; }
        .footer-slogan { color: #e2e8f0; font-size: clamp(0.675rem, 1.5vw, 0.825rem); font-weight: 700; letter-spacing: 1px; max-width: 700px; }

        .btn-pubblico {
            background-color: transparent; color: #38bdf8; border: 2px solid #38bdf8; padding: 12px 24px; font-size: 1rem; font-weight: bold;
            border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; text-decoration: none;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); transition: all 0.3s ease;
        }
        .btn-pubblico:hover { background-color: #38bdf8; color: #0f172a; box-shadow: 0 0 20px rgba(56, 189, 248, 0.6); transform: scale(1.05); }

        .footer-links { max-width: 1400px; margin: 0 auto; width: 100%; display: flex; gap: 15px; flex-wrap: wrap; font-size: 0.8rem; color: #64748b; }
        .footer-links a { color: #64748b; text-decoration: none; transition: color 0.2s; }
        .footer-links a:hover { color: #38bdf8; }

        /* Responsive */
        @media (max-width: 1100px) {
            header { grid-template-columns: 1fr; justify-items: center; gap: 25px; text-align: center; padding: 30px 20px 10px 20px; }
            .gemini-cta, .social-icons { justify-self: center; }
            .policy-card { padding: 40px 20px; }
            .agent-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .footer-main { flex-direction: column; text-align: center; }
            .footer-links { justify-content: center; }
        }
    </style>
</head>
