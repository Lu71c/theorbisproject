<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Orbis Project | Intelligenze Verticali</title>
    <style>
        /* Reset e Base Mobile-First */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header ottimizzato per schermi piccoli */
        header {
            padding: 40px 20px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: clamp(1.8rem, 8vw, 2.8rem); /* Si ridimensiona da solo in base allo schermo */
            letter-spacing: 2px;
            margin: 0;
            color: #38bdf8;
            font-weight: 800;
        }

        .subtitle {
            color: #94a3b8;
            margin-top: 12px;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            font-weight: 400;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Griglia flessibile */
        .container {
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            box-sizing: border-box;
            flex-grow: 1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Box "Gemma" - Stile moderno e pulito */
        .box {
            border: 1px solid #334155;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            background: #1e293b;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .box h3 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 1.4rem;
        }

        .box p {
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 0;
        }

        /* Footer professionale */
        footer {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            border-top: 1px solid #1e293b;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>THE ORBIS PROJECT</h1>
        <p class="subtitle">Ecosistema di Agenti Verticali e Logica Autonoma</p>
    </header>

    <div class="container">
        <div class="grid">
            <div class="box">
                <h3>Cantiere in corso</h3>
                <p>Configurazione della flotta di esperti verticali. Accesso riservato in fase di attivazione.</p>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 The Orbis Project <br> 
        Infrastruttura Certificata Google Business & GDPR Compliant
    </footer>

</body>
</html>
