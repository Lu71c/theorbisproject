<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Orbis Project | Intelligenze Verticali</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            padding: 60px 20px;
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            letter-spacing: 3px;
            margin: 0;
            color: #38bdf8;
        }
        .subtitle {
            color: #94a3b8;
            margin-top: 15px;
            font-size: 1.2rem;
        }
        .container {
            max-width: 1100px;
            width: 90%;
            padding: 40px 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .box {
            border: 1px solid #334155;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            background: #1e293b;
        }
        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <header>
        <h1>THE ORBIS PROJECT</h1>
        <p class="subtitle">Ecosistema di Agenti Verticali Orbis</p>
    </header>
    <div class="container">
        <div class="grid">
            <div class="box">
                <h3>Cantiere in corso</h3>
                <p>Configurazione della flotta di esperti verticali.</p>
            </div>
        </div>
    </div>
    <footer>
        &copy; 2026 The Orbis Project - Infrastruttura Certificata Google Business
    </footer>
</body>
</html>
